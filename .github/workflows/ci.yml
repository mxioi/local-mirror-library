name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Prepare config
        run: |
          cp config/app.example.yaml config/app.yaml
          cp .env.example .env
          mkdir -p wikipedia-local
          test -f wikipedia-local/manifest.json || printf '{"pages": []}\n' > wikipedia-local/manifest.json
      - name: Python compile check
        run: |
          python -m py_compile archive_backend.py mirror_wikipedia_pages.py settings.py installer/main.py
      - name: Backend preflight
        run: |
          python archive_backend.py --check --settings config/app.yaml --env-file .env

  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Prepare config
        run: |
          cp config/app.example.yaml config/app.yaml
          cp .env.example .env
      - name: Build image
        run: docker build -t local-mirror:ci .
